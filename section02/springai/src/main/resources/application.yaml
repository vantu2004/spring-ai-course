spring:
  application:
    name: springai
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: "gpt-5-nano"
          temperature: 1

logging:
  pattern:
    console: "%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n"

  # trog ChatClientConfig đang dùng SimpleLoggerAdvisor nên cần cấp package để bật DEBUG mode (vào file đó  lấy package tương ứng)
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG