spring:
  application:
    name: springai
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            schema: classpath:/schema/schema-h2db.sql
  datasource:
    url: jdbc:h2:file:C:\Users\tulev\OneDrive\Desktop\chatmemory;AUTO_SERVER=true
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true

logging:
  pattern:
    console: "%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n"

  # trog ChatClientConfig đang dùng SimpleLoggerAdvisor nên cần cấp package để bật DEBUG mode (vào file đó  lấy package tương ứng)
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG

